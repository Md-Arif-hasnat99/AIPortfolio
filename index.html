<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNO Portfolio</title>

    <!-- Google Fonts: Spline Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700;800;900&family=Caveat:wght@400..700&display=swap" rel="stylesheet" />

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS CDN (v3 – matching what the Stitch design pages use) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary":           "#f20d0d",
              "background-light":  "#f8f5f5",
              "background-dark":   "#221010",
              "card-dark":         "#260a0a",
              "uno-red":           "#ff5555",
              "uno-blue":          "#5555ff",
              "uno-green":         "#55aa55",
              "uno-yellow":        "#ffaa00",
              "off-white":         "#fcfcfc",
            },
            fontFamily: {
              display: ["Spline Sans", "sans-serif"],
              handwriting: ["Caveat", "cursive"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg:      "1rem",
              xl:      "1.5rem",
              full:    "9999px",
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
